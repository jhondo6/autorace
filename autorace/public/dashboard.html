<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AutoRace</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{

min-height:100vh;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

padding:20px;

background:
radial-gradient(circle at center, rgba(255,0,0,0.2), transparent 60%),
linear-gradient(135deg,#050505,#111);

color:white;

}

.welcome{

font-size:20px;

margin-bottom:30px;

text-align:center;

}

.race-button{

width:100%;
max-width:320px;

padding:18px;

font-size:18px;

border-radius:12px;

border:2px solid #ff2a2a;

background:transparent;

color:white;

cursor:pointer;

box-shadow:0 0 10px red;

transition:0.3s;

}

.race-button:hover{

background:#ff2a2a;

transform:scale(1.03);

box-shadow:0 0 20px red;

}

</style>

</head>

<body>

<div class="welcome" id="welcomeText">
Vamos correr?
</div>

<button class="race-button" onclick="entrarCorrida()">
🏁 ENTRAR NA CORRIDA
</button>

<button style="margin-top:20px;" onclick="window.location.href='historico.html'">
Ver Histórico de Corridas
</button>

<script>

const user = localStorage.getItem("autorace_user")

if(user){
document.getElementById("welcomeText").innerText =
"Vamos correr, " + user + "?"
}

function entrarCorrida(){
window.location.href="carros.html"
}

</script>

</body>
</html>
