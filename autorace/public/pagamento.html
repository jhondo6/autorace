<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagamento</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
padding:30px;
}

.qr{
margin-top:20px;
}

.status{
margin-top:15px;
opacity:0.8;
}

.price{
font-size:20px;
color:#00ff9d;
font-weight:bold;
}

button{
margin-top:20px;
padding:12px 20px;
background:red;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#ff0000;
}

</style>

</head>

<body>

<h1>💳 Pagamento PIX</h1>

<h3 id="carName"></h3>
<div class="price" id="carPrice"></div>

<img id="qrImage" class="qr" width="250">

<p>Escaneie o QR Code para pagar</p>

<div class="status" id="status">
Gerando pagamento...
</div>

<button onclick="voltar()">Cancelar</button>

<script>

const carName = localStorage.getItem("payment_car_name")
const carPrice = localStorage.getItem("payment_car_price")
const carId = localStorage.getItem("payment_car_id")
const username = localStorage.getItem("autorace_user")

// proteção caso usuário entre direto na página
if(!carName || !carPrice || !carId || !username){
alert("Sessão inválida")
window.location.href="carros.html"
}

document.getElementById("carName").innerText = carName
document.getElementById("carPrice").innerText = "R$ " + Number(carPrice).toFixed(2)

let paymentId = null

async function createPayment(){

try{

const res = await fetch("http://localhost:3000/api/create-payment",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
title:carName,
price:Number(carPrice),
username:username,
carId:Number(carId)
})
})

const data = await res.json()

paymentId = data.payment_id

document.getElementById("qrImage").src =
"data:image/png;base64," + data.qr_code_base64

document.getElementById("status").innerText =
"Aguardando pagamento..."

checkPayment()

}catch(e){

document.getElementById("status").innerText =
"Erro ao gerar pagamento"

}

}

async function checkPayment(){

const interval = setInterval(async ()=>{

try{

const res = await fetch(
"http://localhost:3000/api/payment-status/" + paymentId
)

const data = await res.json()

if(data.status === "approved"){

clearInterval(interval)

document.getElementById("status").innerText =
"Pagamento confirmado!"

enterRace()

}

}catch(e){}

},3000)

}

async function enterRace(){

await fetch("http://localhost:3000/api/join-race",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username: username,
carId: Number(carId),
payment_id: paymentId
})
})

window.location.href = "fila.html"

}

function voltar(){
window.location.href="carros.html"
}

createPayment()

</script>

</body>
</html>
