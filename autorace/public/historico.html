<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Histórico de Corridas</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
text-align:center;
}

.race{
background:#1a1a1a;
padding:15px;
margin:15px auto;
border-radius:8px;
max-width:400px;
}

.player{
margin:5px 0;
}

button{
margin-top:20px;
padding:12px 20px;
background:red;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>📜 Histórico de Corridas</h1>

<div id="history"></div>

<button onclick="window.location.href='dashboard.html'">
Voltar
</button>

<script>

async function loadHistory(){

const res = await fetch("http://localhost:3000/api/history")
const history = await res.json()

const container = document.getElementById("history")

container.innerHTML = ""

if(history.length === 0){
container.innerHTML = "Nenhuma corrida ainda"
return
}

// mostrar mais recente primeiro
history.slice().reverse().forEach(race=>{

let html = `
<div class="race">
<h3>Corrida #${race.raceId}</h3>
`

race.result.forEach((player,i)=>{

let medal = ""

if(i === 0) medal = "🥇"
if(i === 1) medal = "🥈"
if(i === 2) medal = "🥉"

html += `
<div class="player">
${medal} ${player.username}
</div>
`

})

html += "</div>"

container.innerHTML += html

})

}

loadHistory()

</script>

</body>
</html>
