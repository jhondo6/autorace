<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultado</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
padding:30px;
}

.player{
background:#1a1a1a;
padding:12px;
margin:6px;
border-radius:6px;
}

button{
margin-top:20px;
padding:12px 20px;
background:red;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>🏁 Resultado da Corrida</h1>

<div id="ranking"></div>

<button onclick="nextRace()">Ir para próxima corrida</button>

<script>

function getCarEmoji(carId){

const emojis={
1:"🛴",
2:"🚗",
3:"🚙",
4:"🏎",
5:"🏎",
6:"🏎"
}

return emojis[carId] || "🏎"

}

async function loadResult(){

const container=document.getElementById("ranking")

container.innerHTML="Carregando resultado..."

const res=await fetch("http://localhost:3000/api/result")
const result=await res.json()

if(!result || result.length===0){
setTimeout(loadResult,1000)
return
}

container.innerHTML=""

result.forEach((player,i)=>{

let medal=""

if(i===0) medal="🥇"
if(i===1) medal="🥈"
if(i===2) medal="🥉"

container.innerHTML+=`
<div class="player">
${medal} ${player.username} ${getCarEmoji(player.carId)}
</div>
`

})

}

function nextRace(){

fetch("http://localhost:3000/api/reset-race",{
method:"POST"
})
.then(()=>{
window.location.href="dashboard.html"
})

}

loadResult()

</script>

</body>
</html>
