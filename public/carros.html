<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escolher Carro</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
padding:20px;
}

h1{
text-align:center;
margin-bottom:25px;
}

.status{
text-align:center;
opacity:0.7;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
max-width:420px;
margin:auto;
}

.card{
background:#1a1a1a;
padding:18px;
border-radius:12px;
text-align:center;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
background:#222;
}

.emoji{
font-size:36px;
margin-bottom:5px;
}

.price{
font-size:18px;
font-weight:bold;
color:#00ff9d;
}

button{
margin-top:10px;
padding:10px;
width:100%;
border:none;
background:#ff2b2b;
color:white;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#ff0000;
}

button:disabled{
opacity:0.6;
cursor:not-allowed;
}

</style>
</head>

<body>

<h1>Escolha seu carro</h1>

<div class="status" id="status">Carregando carros...</div>

<div class="grid" id="cars"></div>

<script>

let loading = false

async function loadCars(){

try{

const res = await fetch("http://localhost:3000/api/cars")
const cars = await res.json()

const container = document.getElementById("cars")
const status = document.getElementById("status")

container.innerHTML = ""
status.innerText = ""

cars.forEach(car=>{

const card = document.createElement("div")
card.className="card"

card.innerHTML = `
<div class="emoji">${car.emoji}</div>
<h3>${car.name}</h3>
<div class="price">R$ ${car.price.toFixed(2)}</div>

<button onclick="buyCar('${car.name}', ${car.price}, ${car.id}, this)">
Entrar na corrida
</button>
`

container.appendChild(card)

})

}catch(e){

document.getElementById("status").innerText = "Erro ao carregar carros"

}

}

function buyCar(name,price,id,btn){

if(loading) return

loading = true
btn.disabled = true
btn.innerText = "Redirecionando..."

localStorage.setItem("payment_car_name", name)
localStorage.setItem("payment_car_price", price)
localStorage.setItem("payment_car_id", id)

setTimeout(()=>{
window.location.href = "pagamento.html"
},300)

}

loadCars()

</script>

</body>
</html>
